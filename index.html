<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نوروز ۱۴۰۵ - شمارش معکوس</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    color: #00354A;
    font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #countdown {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(3rem, 12vw, 8rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    direction: ltr;
    text-align: center;
  }
  #tahvil {
    margin-top: 1.5rem;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: #555;
    direction: rtl;
    text-align: center;
  }
  #audio-prompt {
    position: fixed;
    bottom: 2rem;
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    color: #999;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #audio-prompt.hidden { opacity: 0; pointer-events: none; }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(10rem, 40vw, 25rem);
    font-weight: 900;
    color: #00354A;
    background: #fff;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  #overlay.visible { opacity: 1; }
  #message {
    display: none;
    text-align: center;
  }
  #message h1 {
    font-size: clamp(2.5rem, 10vw, 6rem);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  #message p {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #555;
  }
  #fireworks {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 20;
  }
</style>
</head>
<body>

<div id="main">
  <div id="countdown"></div>
  <div id="tahvil"></div>
</div>
<div id="message">
  <h1>سال ۱۴۰۵ مبارک</h1>
  <br>
  <p id="tahvil-time"></p>
</div>
<canvas id="fireworks"></canvas>
<div id="overlay"></div>
<div id="audio-prompt">برای فعال‌سازی صدا کلیک کنید</div>

<script>
(function() {
  var TARGET = new Date('2026-03-20T12:51:50Z').getTime(); // TEST. Real: 2026-03-20T14:45:59Z
  var $countdown = document.getElementById('countdown');
  var $tahvil = document.getElementById('tahvil');
  var $main = document.getElementById('main');
  var $message = document.getElementById('message');
  var $overlay = document.getElementById('overlay');
  var $audioPrompt = document.getElementById('audio-prompt');

  var FARSI = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];

  function toFarsi(str) {
    return String(str).replace(/\d/g, function(d) { return FARSI[d]; });
  }

  // --- Fireworks ---
  var fwCanvas = document.getElementById('fireworks');
  var fwCtx = fwCanvas.getContext('2d');
  var particles = [];
  var fwRunning = false;

  function resizeCanvas() {
    fwCanvas.width = window.innerWidth;
    fwCanvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function launchFirework() {
    var x = Math.random() * fwCanvas.width * 0.8 + fwCanvas.width * 0.1;
    var y = Math.random() * fwCanvas.height * 0.4 + fwCanvas.height * 0.1;
    var hue = Math.random() * 360;
    var count = 60 + Math.floor(Math.random() * 40);
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 4 + 1;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.01 + Math.random() * 0.015,
        hue: hue + Math.random() * 30 - 15,
        size: Math.random() * 2.5 + 1
      });
    }
  }

  function animateFireworks() {
    if (!fwRunning) return;
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.vx *= 0.99;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      fwCtx.globalAlpha = p.life;
      fwCtx.fillStyle = 'hsl(' + p.hue + ',90%,60%)';
      fwCtx.beginPath();
      fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      fwCtx.fill();
    }
    fwCtx.globalAlpha = 1;
    requestAnimationFrame(animateFireworks);
  }

  function startFireworks(durationMs) {
    fwRunning = true;
    animateFireworks();
    // Launch bursts at random intervals
    var elapsed = 0;
    function scheduleBurst() {
      if (elapsed >= durationMs) return;
      var delay = 200 + Math.random() * 500;
      setTimeout(function() {
        launchFirework();
        elapsed += delay;
        scheduleBurst();
      }, delay);
    }
    scheduleBurst();
    // Also launch a few immediately
    launchFirework();
    setTimeout(launchFirework, 100);
    setTimeout(launchFirework, 250);
    // Stop after duration
    setTimeout(function() {
      fwRunning = false;
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    }, durationMs + 2000);
  }

  // --- Audio ---
  var audioUnlocked = false;
  var cannonSound = new Audio('sounds/cannon.mp3');
  var happyNewYearSound = new Audio('sounds/happy-new-year.mp3');
  var celebrationSound = new Audio('sounds/celebration.mp3');
  var numberFiles = {
    5: new Audio('sounds/ms/5.mp3'),
    4: new Audio('sounds/mh/4.mp3'),
    3: new Audio('sounds/ms/3.mp3'),
    2: new Audio('sounds/mh/2.mp3'),
    1: new Audio('sounds/ms/1.mp3')
  };

  cannonSound.preload = 'auto';
  happyNewYearSound.preload = 'auto';
  celebrationSound.preload = 'auto';
  for (var k in numberFiles) numberFiles[k].preload = 'auto';

  function unlockAudio() {
    if (audioUnlocked) return;
    // Use AudioContext to unlock audio on iOS/Safari without playing actual sounds
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var buf = ctx.createBuffer(1, 1, 22050);
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    // Also touch each audio element to allow future playback
    var allSounds = [cannonSound, happyNewYearSound, celebrationSound];
    for (var k in numberFiles) allSounds.push(numberFiles[k]);
    allSounds.forEach(function(s) { s.load(); });
    audioUnlocked = true;
    $audioPrompt.classList.add('hidden');
  }

  document.addEventListener('click', unlockAudio, { once: false });
  document.addEventListener('touchstart', unlockAudio, { once: false });

  function playNumber(n) {
    if (!audioUnlocked || !numberFiles[n]) return;
    numberFiles[n].currentTime = 0;
    numberFiles[n].play().catch(function() {});
  }

  function playCannon() {
    if (!audioUnlocked) return;
    var s = cannonSound.cloneNode();
    s.play().catch(function() {});
  }

  // --- Tahvil time ---
  function formatTahvil() {
    var d = new Date(TARGET);
    var offset = -d.getTimezoneOffset();
    var sign = offset >= 0 ? '+' : '-';
    var absOff = Math.abs(offset);
    var offH = Math.floor(absOff / 60);
    var offM = absOff % 60;
    var hh = String(d.getHours()).padStart(2, '0');
    var mm = String(d.getMinutes()).padStart(2, '0');
    var tzLabel = 'UTC' + sign + offH + (offM ? ':' + String(offM).padStart(2, '0') : '');
    try {
      var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      if (tz) tzLabel = tz.replace(/_/g, ' ');
    } catch(e) {}
    var ss = String(d.getSeconds()).padStart(2, '0');
    return 'لحظه تحویل سال ۱۴۰۵ ' + toFarsi(hh) + ' و ' + toFarsi(mm) + ' دقیقه و ' + toFarsi(ss) + ' ثانیه به وقت ' + tzLabel;
  }

  $tahvil.textContent = formatTahvil();

  // --- Time sync ---
  var timeOffset = 0;
  var synced = false;

  function syncTime(cb) {
    var localBefore = Date.now();
    fetch(window.location.href + '?_=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
      .then(function(r) {
        var localAfter = Date.now();
        var dateHeader = r.headers.get('Date');
        if (dateHeader) {
          var roundTrip = localAfter - localBefore;
          var serverTime = new Date(dateHeader).getTime();
          timeOffset = serverTime - localBefore - Math.round(roundTrip / 2);
        }
      })
      .finally(function() { synced = true; if (cb) cb(); });
  }

  function now() { return Date.now() + timeOffset; }

  // --- Countdown ---
  var finished = false;
  var lastFinalSec = -1;

  function pad2(n) { return n < 10 ? '0' + n : String(n); }

  function showTahvilTime() {
    document.getElementById('tahvil-time').textContent = formatTahvil();
  }

  function celebrate() {
    $main.style.display = 'none';
    $overlay.classList.remove('visible');
    $overlay.textContent = '';
    $message.style.display = 'block';
    showTahvilTime();
    startFireworks(8000);
    // Cannon 3 times
    playCannon();
    setTimeout(playCannon, 600);
    setTimeout(playCannon, 1200);
    // Happy new year voice after cannons
    setTimeout(function() {
      if (!audioUnlocked) return;
      happyNewYearSound.currentTime = 0;
      happyNewYearSound.play().catch(function() {});
    }, 1500);
    // Celebration music after happy new year voice
    setTimeout(function() {
      if (!audioUnlocked) return;
      celebrationSound.currentTime = 0;
      celebrationSound.play().catch(function() {});
    }, 3500);
  }

  function tick() {
    if (finished) return;
    var diff = TARGET - now();

    if (diff <= 0) {
      finished = true;
      celebrate();
      return;
    }

    var totalSec = Math.ceil(diff / 1000);
    var days = Math.floor(totalSec / 86400);
    var hours = Math.floor((totalSec % 86400) / 3600);
    var minutes = Math.floor((totalSec % 3600) / 60);
    var seconds = totalSec % 60;
    $countdown.textContent = toFarsi(pad2(days) + ':' + pad2(hours) + ':' + pad2(minutes) + ':' + pad2(seconds));

    // Final 5 seconds: full-screen overlay stays visible, only number changes
    if (totalSec <= 5 && totalSec >= 1) {
      $overlay.classList.add('visible');
      if (totalSec !== lastFinalSec) {
        lastFinalSec = totalSec;
        $overlay.textContent = toFarsi(String(totalSec));
        playNumber(totalSec);
      }
    }
  }

  // Sync time first, then start countdown, re-sync every 30s
  function start() {
    if (now() >= TARGET) {
      finished = true;
      $main.style.display = 'none';
      $message.style.display = 'block';
      showTahvilTime();
      $audioPrompt.classList.add('hidden');
    } else {
      tick();
      setInterval(tick, 200);
      setInterval(function() { if (!finished) syncTime(); }, 10000);
    }
  }
  syncTime(start);
})();
</script>
</body>
</html>
