<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نوروز ۱۴۰۵ - شمارش معکوس</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #countdown {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(3rem, 12vw, 8rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    direction: ltr;
    text-align: center;
  }
  #tahvil {
    margin-top: 1.5rem;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: #555;
    direction: rtl;
    text-align: center;
  }
  #audio-prompt {
    position: fixed;
    bottom: 2rem;
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    color: #999;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #audio-prompt.hidden { opacity: 0; pointer-events: none; }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(10rem, 40vw, 25rem);
    font-weight: 900;
    color: #111;
    background: #fff;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  #overlay.visible { opacity: 1; }
  #message {
    display: none;
    text-align: center;
  }
  #message h1 {
    font-size: clamp(2.5rem, 10vw, 6rem);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  #message p {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #555;
  }
</style>
</head>
<body>

<div id="main">
  <div id="countdown"></div>
  <div id="tahvil"></div>
</div>
<div id="message">
  <h1>سال نو مبارک</h1>
  <p>نوروز ۱۴۰۵</p>
</div>
<div id="overlay"></div>
<div id="audio-prompt">برای فعال‌سازی صدا کلیک کنید</div>

<script>
(function() {
  var TARGET = new Date('2026-03-20T12:16:32Z').getTime(); // TEST: 2.5min from now. Real: 2026-03-20T14:46:00Z
  var $countdown = document.getElementById('countdown');
  var $tahvil = document.getElementById('tahvil');
  var $main = document.getElementById('main');
  var $message = document.getElementById('message');
  var $overlay = document.getElementById('overlay');
  var $audioPrompt = document.getElementById('audio-prompt');

  var FARSI = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];

  function toFarsi(str) {
    return String(str).replace(/\d/g, function(d) { return FARSI[d]; });
  }

  // --- Audio ---
  var audioUnlocked = false;
  var cannonSound = new Audio('sounds/cannon.mp3');
  var celebrationSound = new Audio('sounds/celebration.mp3');
  var numberFiles = {
    5: new Audio('sounds/ms/5.mp3'),
    4: new Audio('sounds/mh/4.mp3'),
    3: new Audio('sounds/ms/3.mp3'),
    2: new Audio('sounds/mh/2.mp3'),
    1: new Audio('sounds/ms/1.mp3')
  };

  cannonSound.preload = 'auto';
  celebrationSound.preload = 'auto';
  for (var k in numberFiles) numberFiles[k].preload = 'auto';

  function unlockAudio() {
    if (audioUnlocked) return;
    var allSounds = [cannonSound, celebrationSound];
    for (var k in numberFiles) allSounds.push(numberFiles[k]);
    allSounds.forEach(function(s) {
      s.play().then(function() { s.pause(); s.currentTime = 0; }).catch(function() {});
    });
    audioUnlocked = true;
    $audioPrompt.classList.add('hidden');
  }

  document.addEventListener('click', unlockAudio, { once: false });
  document.addEventListener('touchstart', unlockAudio, { once: false });

  function playNumber(n) {
    if (!audioUnlocked || !numberFiles[n]) return;
    numberFiles[n].currentTime = 0;
    numberFiles[n].play().catch(function() {});
  }

  function playCannon() {
    if (!audioUnlocked) return;
    var s = cannonSound.cloneNode();
    s.play().catch(function() {});
  }

  // --- Tahvil time ---
  function formatTahvil() {
    var d = new Date(TARGET);
    var offset = -d.getTimezoneOffset();
    var sign = offset >= 0 ? '+' : '-';
    var absOff = Math.abs(offset);
    var offH = Math.floor(absOff / 60);
    var offM = absOff % 60;
    var hh = String(d.getHours()).padStart(2, '0');
    var mm = String(d.getMinutes()).padStart(2, '0');
    var tzLabel = 'UTC' + sign + offH + (offM ? ':' + String(offM).padStart(2, '0') : '');
    try {
      var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      if (tz) tzLabel = tz.replace(/_/g, ' ');
    } catch(e) {}
    var ss = String(d.getSeconds()).padStart(2, '0');
    return 'لحظه تحویل سال ۱۴۰۵ ' + toFarsi(hh) + ' و ' + toFarsi(mm) + ' دقیقه و ' + toFarsi(ss) + ' ثانیه به وقت ' + tzLabel;
  }

  $tahvil.textContent = formatTahvil();

  // --- Countdown ---
  var finished = false;
  var lastFinalSec = -1;

  function pad2(n) { return n < 10 ? '0' + n : String(n); }

  function celebrate() {
    $main.style.display = 'none';
    $overlay.classList.remove('visible');
    $overlay.textContent = '';
    $message.style.display = 'block';
    // Cannon 3 times
    playCannon();
    setTimeout(playCannon, 600);
    setTimeout(playCannon, 1200);
    // Wait 1.5s then play celebration MP3
    setTimeout(function() {
      if (!audioUnlocked) return;
      celebrationSound.currentTime = 0;
      celebrationSound.play().catch(function() {});
    }, 2000);
  }

  function tick() {
    if (finished) return;
    var now = Date.now();
    var diff = TARGET - now;

    if (diff <= 0) {
      finished = true;
      celebrate();
      return;
    }

    var totalSec = Math.ceil(diff / 1000);
    var days = Math.floor(totalSec / 86400);
    var hours = Math.floor((totalSec % 86400) / 3600);
    var minutes = Math.floor((totalSec % 3600) / 60);
    var seconds = totalSec % 60;
    $countdown.textContent = toFarsi(pad2(days) + ':' + pad2(hours) + ':' + pad2(minutes) + ':' + pad2(seconds));

    // Final 5 seconds: full-screen overlay stays visible, only number changes
    if (totalSec <= 5 && totalSec >= 1) {
      $overlay.classList.add('visible');
      if (totalSec !== lastFinalSec) {
        lastFinalSec = totalSec;
        $overlay.textContent = toFarsi(String(totalSec));
        playNumber(totalSec);
      }
    }
  }

  // Initial check
  if (Date.now() >= TARGET) {
    finished = true;
    $main.style.display = 'none';
    $message.style.display = 'block';
    $audioPrompt.classList.add('hidden');
  } else {
    tick();
    setInterval(tick, 200);
  }
})();
</script>
</body>
</html>
